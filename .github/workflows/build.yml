name: Build APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Calculate version
      run: |
        # 获取最新的 tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        
        # 解析版本号
        VERSION=${LATEST_TAG#v}
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        
        # 递增 patch 版本
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
        
        echo "VERSION_NAME=$NEW_VERSION" >> $GITHUB_ENV
        echo "VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + NEW_PATCH))" >> $GITHUB_ENV
        echo "Version: $NEW_VERSION (from $LATEST_TAG)"

    - name: Decode keystore
      if: env.KEYSTORE_BASE64 != ''
      run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease -PversionCode=${{ env.VERSION_CODE }} -PversionName=${{ env.VERSION_NAME }}
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: fryfrog-hub-${{ env.VERSION_NAME }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION_NAME }}
        name: v${{ env.VERSION_NAME }}
        files: app/build/outputs/apk/release/*.apk
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push version tag
      run: |
        git tag "v${{ env.VERSION_NAME }}"
        git push origin "v${{ env.VERSION_NAME }}"
